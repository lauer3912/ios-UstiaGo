name: UstiaGo
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_ENTITLEMENTS: UstiaGo/UstiaGo.entitlements

targets:
  UstiaGo:
    type: application
    platform: iOS
    sources:
      - path: UstiaGo/Sources
        type: group
      - path: UstiaGo/Assets.xcassets
        type: group
        excludes:
          - "**/Contents.json"
    settings:
      base:
        INFOPLIST_FILE: UstiaGo/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.UstiaGo
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
