name: UstiaGo
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  UstiaGo:
    type: application
    platform: iOS
    sources:
      - path: UstiaGo
        excludes:
          - "**/.DS_Store"
          - "**/Info.plist"
    settings:
      base:
        INFOPLIST_FILE: UstiaGo/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.UstiaGo
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9L6N2ZF26B
        CODE_SIGN_ENTITLEMENTS: UstiaGo/UstiaGo.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"

  UstiaGoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UstiaGoUITests
    dependencies:
      - target: UstiaGo
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.UstiaGo.UITests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9L6N2ZF26B
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
