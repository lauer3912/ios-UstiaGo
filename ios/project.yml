name: UstiaGo
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  UstiaGo:
    type: application
    platform: iOS
    sources:
      - path: UstiaGo/Sources
        type: group
      - path: UstiaGo/Assets.xcassets
        type: group
        excludes:
          - "**/Contents.json"
    settings:
      base:
        INFOPLIST_FILE: UstiaGo/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.UstiaGo
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        DEVELOPMENT_TEAM: 9L6N2ZF26B
        CODE_SIGN_ENTITLEMENTS: UstiaGo/UstiaGo.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"

  UstiaGoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UstiaGoUITests
    dependencies:
      - target: UstiaGo
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.UstiaGo.UITests
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        DEVELOPMENT_TEAM: 9L6N2ZF26B
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
